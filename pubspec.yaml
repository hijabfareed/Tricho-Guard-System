name: al_hair_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.7
  # google_fonts: 6.2.1 # Removed due to constant evaluation error in Flutter 3.27+
  flutter_riverpod: ^2.5.1
  injectable: ^2.2.0
  get_it: ^7.6.0
  freezed_annotation: ^2.4.1
  build_runner: ^2.4.6
  shared_preferences: ^2.2.0
  intl: ^0.20.2
  freezed: ^2.4.2
  dio: ^5.3.2
  retrofit: ^4.0.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  retrofit_generator: ^8.0.4
  flutter_localization: ^0.3.3
  cached_network_image: ^3.4.1
  get: ^4.7.2
  loading_animation_widget: ^1.3.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  get_storage: ^2.1.1
  tflite_flutter: ^0.12.1
  image: ^4.5.4
  image_picker: ^1.2.1
  fl_chart: ^0.66.0
  file_picker: ^10.3.10
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.2
  flutter_bluetooth_serial_plus: ^0.5.1
  permission_handler: ^11.3.1
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  injectable_generator: ^2.3.0

flutter_intl:
  main_locale: en
  enabled: true
  output_dir: lib/src/common/translations
  arb_dir: lib/src/common/translations

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/svg/
    - assets/models/
