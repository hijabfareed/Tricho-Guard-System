<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="al_hair_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>al_hair_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #install-banner {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(10, 24, 48, 0.92);
      color: #ffffff;
      font-family: "Segoe UI", Tahoma, sans-serif;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    #install-button {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      background: #2f80ed;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="install-banner" role="dialog" aria-live="polite">
    <span>Prepare to install TrichoGuard for a better experience.</span>
    <button id="install-button" type="button">Prepare to Install</button>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    let deferredPrompt;
    const installBanner = document.getElementById('install-banner');
    const installButton = document.getElementById('install-button');

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBanner.style.display = 'flex';
    });

    installButton.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('Install is currently unavailable. Please open this site in a supported browser and try again.');
        return;
      }

      deferredPrompt.prompt();
      const choiceResult = await deferredPrompt.userChoice;
      if (choiceResult.outcome === 'accepted') {
        installBanner.style.display = 'none';
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      installBanner.style.display = 'none';
      deferredPrompt = null;
    });
  </script>
</body>
</html>
